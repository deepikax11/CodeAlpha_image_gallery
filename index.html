<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
        <p>about technology</p>
    </header>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button class="active" data-filter="all">All</button>
        <button data-filter="devices">devices</button>
        <button data-filter="innovation">innovation</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class=" image innovation">
            <img src="codingsetup.jpeg" alt="coding setup">
        </div>

        <div class="image innovation">
            <img src="Ai_robot.jpeg" alt="robot">
        </div>

        <div class="image devices">
            <img src="smartphone.jpeg" alt="smartphone">
        </div>

        <div class="image innovation">
            <img src="data_center-servers.jpeg" alt="data center">
        </div>

        <div class="image devices">
            <img src="erabuds.jpeg"alt="wireless earbuds">
        </div>

        <div class="image devices">
            <img src="smartwatch.jpeg" alt="smartwatch">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox">

        <span class="close">&times;</span>

        <span class="prev">&#10094;</span>

        <img class="lightbox-img" src="" alt="">

        <span class="next">&#10095;</span>

    </div>

    <script src="script.js"></script>

</body>
</html>
